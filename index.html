<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System // Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="app-container">
    
    <header class="top-header">
        <h1>Level Up In<br>66 Days</h1>
    </header>

    <section class="player-card">
        <div class="card-header">
            <h2>Your Rating <i class="fa-solid fa-star"></i></h2>
            <div class="tabs">
                <span class="tab active">CURRENT RATING</span>
                <span class="tab">POTENTIAL</span>
            </div>
        </div>

        <div class="level-info">
            <div class="level-badge">
                <span class="level-num" id="player-level">5</span>
                <span class="level-text">LEVEL</span>
            </div>
            <div class="xp-info">
                <h3 id="player-xp">5,450</h3>
                <p>XP earned</p>
            </div>
        </div>

        <div class="progress-container" id="progress-bar">
            </div>

        <div class="stats-list" id="stats-list">
            </div>
    </section>

    <section class="quests-section">
        <div class="quests-header">
            <h2>Day 33/66</h2>
            <div class="nav-arrows">
                <i class="fa-solid fa-chevron-left"></i>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>
        <p class="subtitle">You're doing great. Keep going!</p>

        <div class="quest-tabs">
            <span class="q-tab active">To-dos <span class="badge">2</span></span>
            <span class="q-tab">Done <span class="badge">0</span></span>
            <span class="q-tab">Skipped <span class="badge">0</span></span>
            <button class="add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div class="quest-list" id="quest-list">
            </div>
    </section>

    <nav class="bottom-nav">
        <i class="fa-solid fa-sun active-icon"></i>
        <i class="fa-solid fa-chart-simple"></i>
        <i class="fa-solid fa-shield-halved"></i>
        <i class="fa-solid fa-user-group"></i>
        <i class="fa-solid fa-border-all"></i>
    </nav>

</div>

<script src="script.js"></script>
</body>
</html>
